; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = wemos_d1_mini32
framework = arduino

; --- Convenience settings for Phase 2 bring-up (flash + serial monitor) ---
; Adjust ports to whatever shows up under /dev/tty.* or /dev/cu.* on macOS.
upload_port = /dev/cu.usbserial-0001
monitor_port = /dev/cu.usbserial-0001
monitor_speed = 115200

; Avoid auto-reset / bootloader noise when opening the serial monitor.
monitor_dtr = 0
monitor_rts = 0

; If uploads are flaky, try lowering (e.g. 115200 or 230400).
upload_speed = 460800
